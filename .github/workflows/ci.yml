name: CI
on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  workflow_dispatch:
jobs:
  ci:
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}-${{ matrix.sqlserver.label }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        sqlserver:
          - label: 'SQL Server 2025'
            version: '2025'
          - label: 'SQL Server 2022'
            version: '2022'
          - label: 'SQL Server 2019'  
            version: '2019'
        include:
          - os: windows-latest
            name: Windows
          - os: ubuntu-latest
            name: Linux
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run
        uses: ./
        with:
          connection-string-env-var: SQL_CONN_STR
          catalog: my-test-catalog
          sqlserver-version: ${{ matrix.sqlserver.version }}
      - name: Check result
        shell: pwsh
        run: |
          $connstr = $Env:SQL_CONN_STR
          Write-Host "Connection String: $connstr"

          $result = sqlcmd -Q "SELECT DB_NAME() as CatalogName" -d "my-test-catalog"
          echo $result
  ci-full-text-search:
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}-SQL Server 2022-FTS
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
          - os: ubuntu-latest
            name: Linux
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run with FTS
        uses: ./
        with:
          connection-string-env-var: SQL_CONN_STR
          catalog: my-test-catalog
          sqlserver-version: "2022"
          enable-full-text-search: "true"
      - name: Check FTS result
        shell: pwsh
        run: |
          $connstr = $Env:SQL_CONN_STR
          Write-Host "Connection String: $connstr"

          sqlcmd -b -Q "IF FULLTEXTSERVICEPROPERTY('IsFullTextInstalled') <> 1 THROW 50001, 'Full-Text Search is not installed.', 1;"
          sqlcmd -b -Q "USE [my-test-catalog];
                        CREATE TABLE dbo.FullTextSmoke (Id INT NOT NULL, Content NVARCHAR(200) NOT NULL);
                        CREATE UNIQUE INDEX UX_FullTextSmoke_Id ON dbo.FullTextSmoke(Id);
                        CREATE FULLTEXT CATALOG SmokeCatalog AS DEFAULT;
                        CREATE FULLTEXT INDEX ON dbo.FullTextSmoke(Content LANGUAGE 1033) KEY INDEX UX_FullTextSmoke_Id;"
