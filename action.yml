name: Run SQL Server
description: Runs SQL Server using a method appropriate for the target platform
inputs:
  connection-string-env-var:
    description: Name of the output environment variable that will receive the connection string
    required: true
  catalog:
    description: Name of the initial database name (catalog) to create
    required: false
    default: nservicebus
  collation:
    description: The collation to use for the SQL Server database
    required: false
    default: "SQL_Latin1_General_CP1_CS_AS"
  sqlserver-version:
    description: The SQL server major version to use
    required: false
    default: "2022"
  extra-params:
    description: Extra parameters to add to the connection string
    required: false
  enable-full-text-search:
    description: Enable SQL Server Full-Text Search installation/verification
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    - name: Install SQL Server (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        # Windows SQL install via Chocolatey
        $enableFts = '${{ inputs.enable-full-text-search }}' -eq 'true'
        $packageName = if ($enableFts) { 'sql-server-express-adv' } else { 'sql-server-express' }

        # Limited output is package|version
        $newestVersion = choco search $packageName --exact --all-versions --limit-output `
          | ForEach-Object { ($_ -split '\|')[1] } `
          | Where-Object { $_ -like "${{ inputs.sqlserver-version }}*" } `
          | Sort-Object { [version](($_ -split '-')[0]) } -Descending `
          | Select-Object -First 1

        $installArgs = @('install', $packageName, '-y', '--no-progress')

        if ($newestVersion) {
            $installArgs += @('--version', $newestVersion)
            Write-Output "Installing $packageName version $newestVersion with Chocolatey..."
        } else {
            Write-Output "No versions found matching the prefix '${{ inputs.sqlserver-version }}'. Installing latest $packageName with Chocolatey..."
        }

        choco @installArgs

        Write-Output "Setting environment variables for sqlcmd..."
        Write-Output "SQLCMDSERVER=.\SQLEXPRESS" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf-8 -Append

        Write-Output "Setting environment variable ${{ inputs.connection-string-env-var }} to SQL connection string..."
        Write-Output "${{ inputs.connection-string-env-var }}=Data Source=.\SQLEXPRESS;Initial Catalog=${{ inputs.catalog }};Integrated Security=True;Encrypt=false;${{ inputs.extra-params }}" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf-8 -Append
    - name: Start SQL Server (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        # Linux SQL install via Docker

        # If the password generator needs to be changed, make sure the resulting password meets SQL Server password requirements
        sa_pw=$(uuidgen)
        echo "::add-mask::$sa_pw"

        image="mcr.microsoft.com/mssql/server:${{ inputs.sqlserver-version }}-latest"
        base_run_args=(
          -e "ACCEPT_EULA=Y"
          -e "SA_PASSWORD=$sa_pw"
          -e "MSSQL_PID=Developer"
          -e "MSSQL_COLLATION=${{ inputs.collation }}"
          -e "SQLCMDSERVER=localhost"
          -e "SQLCMDUSER=sa"
          -e "SQLCMDPASSWORD=$sa_pw"
          -p 1433:1433
          --name sqlserver
          -d
        )

        if [ "${{ inputs.enable-full-text-search }}" = "true" ]; then
          echo "Starting SQL Server container in setup mode for Full-Text Search installation..."
          docker run "${base_run_args[@]}" --entrypoint /bin/bash "$image" -lc "sleep infinity"
        else
          echo "Starting SQL Server in a Docker container..."
          docker run "${base_run_args[@]}" "$image"
        fi

        if [ "${{ inputs.enable-full-text-search }}" = "true" ]; then
          case "${{ inputs.sqlserver-version }}" in
            2022*) sql_engine_major=16; repo_channel=2022 ;;
            2019*) sql_engine_major=15; repo_channel=2019 ;;
            *)
              echo "Unsupported sqlserver-version for FTS: '${{ inputs.sqlserver-version }}'. Supported values: 2019, 2022." >&2
              exit 1
              ;;
          esac

          echo "Installing Full-Text Search support in the SQL Server container..."
          docker exec -u 0 sqlserver bash -lc "
            set -euo pipefail
            apt-get update
            ACCEPT_EULA=Y apt-get install -y --no-install-recommends curl gnupg

            . /etc/os-release
            curl -fsSL https://packages.microsoft.com/keys/microsoft.asc \
              | gpg --dearmor > /usr/share/keyrings/microsoft-prod.gpg
            echo \"deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-prod.gpg] https://packages.microsoft.com/ubuntu/\${VERSION_ID}/mssql-server-${repo_channel} \${VERSION_CODENAME} main\" \
              > /etc/apt/sources.list.d/mssql-server.list

            apt-get update

            fts_version=\$(apt-cache madison mssql-server-fts \
              | awk '{print \$3}' \
              | grep -E '^${sql_engine_major}\.' \
              | head -n 1)

            if [ -z \"\${fts_version}\" ]; then
              echo \"No mssql-server-fts package found for SQL Server engine major ${sql_engine_major}.\" >&2
              exit 1
            fi

            ACCEPT_EULA=Y apt-get install -y --no-install-recommends \"mssql-server-fts=\${fts_version}\"
            apt-get clean
            rm -rf /var/lib/apt/lists/*
          "

          echo "Starting SQL Server process..."
          docker exec -d sqlserver /opt/mssql/bin/sqlservr
        fi

        echo "Creating `sqlcmd` bash script to forward commands via docker exec"
        mkdir -p ~/bin
        cat << 'EOF' > ~/bin/sqlcmd
        #!/bin/bash
        docker exec sqlserver /opt/mssql-tools18/bin/sqlcmd -C "$@"
        EOF

        echo "Making forwarding sqlcmd script executable"
        chmod +x ~/bin/sqlcmd

        echo "Adding sqlcmd forwarding script to PATH"
        echo "$HOME/bin" >> $GITHUB_PATH

        echo "Setting environment variable ${{ inputs.connection-string-env-var }} to SQL connection string..."
        echo "${{ inputs.connection-string-env-var }}=Server=localhost;Database=${{ inputs.catalog }};User Id=sa;Password=$sa_pw;Encrypt=false;${{ inputs.extra-params }}" >> $GITHUB_ENV
    - name: Setup server
      shell: pwsh
      run: |
        # Wait for availability then create initial catalog
        $enableFts = '${{ inputs.enable-full-text-search }}' -eq 'true'

        for ($i = 1; $i -le 30; $i++) {
          Write-Output "Attempt $i/30 to connect to SQL Server..."
          sqlcmd -b -Q "SELECT @@SERVERNAME as ServerName" 2>&1>$null
          if ($?) {
            Write-Output "  - SQL Server is now ready"
            break
          } else {
            Write-Output "  - Not ready, sleeping for 5s"
            Start-Sleep -seconds 5
          }
        }

        if ($enableFts) {
          Write-Output "Verifying Full-Text Search availability..."
          $ftsInstalled = (sqlcmd -h -1 -W -Q "SET NOCOUNT ON; SELECT FULLTEXTSERVICEPROPERTY('IsFullTextInstalled');").Trim()
          if ($LASTEXITCODE -ne 0 -or $ftsInstalled -ne '1') {
            throw "Full-Text Search was requested but is not available."
          }
        }

        Write-Output "Creating initial catalog '${{ inputs.catalog }}'"
        sqlcmd -Q "CREATE DATABASE [${{ inputs.catalog }}]"
